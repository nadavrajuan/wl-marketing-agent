<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login — WL Marketing Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">⚡</div>
      <h1 class="text-2xl font-bold text-white">WL Marketing Agent</h1>
      <p class="text-gray-400 text-sm mt-1">Iterative PPC Analytics</p>
    </div>
    <form method="POST" action="/agent/login" class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-4">
      {% if error %}
      <div class="bg-red-900/40 border border-red-700 rounded-lg p-3 text-red-300 text-sm">{{ error }}</div>
      {% endif %}
      <div>
        <label class="block text-xs text-gray-400 mb-1">Username</label>
        <input name="username" type="text" autocomplete="username"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Password</label>
        <input name="password" type="password" autocomplete="current-password"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 rounded-lg text-sm transition-colors">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
